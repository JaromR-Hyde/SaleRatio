<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sale Ratio Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="top-nav">
        <span id="userContext">Loading Session...</span>
        <button id="logoutBtn" class="logout-btn">Logout & Exit</button>
    </div>

    <div class="summary-container">
        <h1>Sale Ratio Summary Report</h1>
        
        <div id="filter-builder">
            <div id="filter-rows-container">
                </div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="addFilterBtn" class="form-input" style="cursor: pointer;">+ Add Filter</button>
                <button id="applyFiltersBtn" class="logout-btn" style="background-color: #007BFF;">Apply Filters</button>
                <button id="exportExcelBtn" class="form-input" style="background-color: #0a7d00; color: white; cursor: pointer;">Export to Excel</button>
                <button id="clearFiltersBtn" class="form-input" style="cursor: pointer;">Reset All</button>
            </div>
        </div>

        <div class="summary-grid">
            <div>Total Sales: <span id="totalSales">0</span></div>
            <div>Filtered Results: <span id="filteredCount">0</span></div>
            <div>Report Year: <span>2026</span></div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Jurisdiction</th>
                        <th>Region</th>
                        <th>Parcel ID</th>
                        <th>Sale Date</th>
                        <th>Adjusted Sale Price</th>
                        <th>Land Value</th>
                        <th>Imp Value</th>
                        <th>Total Value</th>
                        <th>Ratio</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
